events {
    worker_connections 1024;
}

http {
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=voicebox:10m rate=10r/s;

    # Upstream
    upstream voicebox {
        server voicebox:17493;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl http2;
        server_name _;

        ssl_certificate /etc/letsencrypt/live/voicebox.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/voicebox.yourdomain.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;

        # API key validation
        set $api_key "";

        location /api/ {
            # Rate limiting
            limit_req zone=voicebox burst=20 nodelay;

            # Check API key
            if ($http_authorization != "Bearer $API_KEY") {
                return 401 '{"error":"Invalid API key"}';
            }

            proxy_pass http://voicebox;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Public endpoints (health check)
        location /api/health {
            proxy_pass http://voicebox;
        }

        # TTS endpoint (protected)
        location /speak {
            limit_req zone=voicebox burst=5 nodelay;

            if ($http_authorization != "Bearer $API_KEY") {
                return 401 '{"error":"Invalid API key"}';
            }

            proxy_pass http://voicebox;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Longer timeout for TTS generation
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
