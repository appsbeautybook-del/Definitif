# Voicebox Reverse Proxy — nginx config
# Protège l'API Voicebox avec authentification API key
# Usage: placer ce fichier dans /etc/nginx/conf.d/voicebox.conf

# Générer une clé API:
#   openssl rand -hex 32
# Puis définir VOICEBOX_API_KEY dans backend/.env avec cette valeur

upstream voicebox_backend {
    server 127.0.0.1:17493;
    keepalive 32;
}

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=voicebox:10m rate=10r/s;

server {
    listen 443 ssl http2;
    server_name voicebox.ton-domaine.com;

    # SSL (Let's Encrypt)
    ssl_certificate /etc/letsencrypt/live/voicebox.ton-domaine.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/voicebox.ton-domaine.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Sécurité
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Upload limit (for audio)
    client_max_body_size 50m;

    # API endpoints — require API key
    location /speak {
        limit_req zone=voicebox burst=5 nodelay;

        # Auth: vérifier le header X-Voicebox-Api-Key
        # Le client doit envoyer: X-Voicebox-Api-Key: <your-api-key>
        set $auth_ok 0;
        if ($http_x_voicebox_api_key = "CHANGE_ME_TO_RANDOM_HEX") {
            set $auth_ok 1;
        }

        # Alternative: Authorization: Bearer <key>
        if ($http_authorization = "Bearer CHANGE_ME_TO_RANDOM_HEX") {
            set $auth_ok 1;
        }

        if ($auth_ok = 0) {
            return 401 '{"error":"Unauthorized: missing or invalid API key"}';
        }

        proxy_pass http://voicebox_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;

        # Timeout pour génération longue
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Generate endpoint (polling)
    location /generate/ {
        limit_req zone=voicebox burst=20 nodelay;

        set $auth_ok 0;
        if ($http_x_voicebox_api_key = "CHANGE_ME_TO_RANDOM_HEX") {
            set $auth_ok 1;
        }
        if ($http_authorization = "Bearer CHANGE_ME_TO_RANDOM_HEX") {
            set $auth_ok 1;
        }
        if ($auth_ok = 0) {
            return 401 '{"error":"Unauthorized"}';
        }

        proxy_pass http://voicebox_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # Audio files (public after generation)
    location /audio/ {
        proxy_pass http://voicebox_backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # Profiles (read-only, rate limited)
    location /api/profiles {
        limit_req zone=voicebox burst=5 nodelay;
        proxy_pass http://voicebox_backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # Health check (public)
    location /api/health {
        proxy_pass http://voicebox_backend;
        proxy_set_header Host $host;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # Block everything else
    location / {
        return 404 '{"error":"Not found"}';
    }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name voicebox.ton-domaine.com;
    return 301 https://$host$request_uri;
}
